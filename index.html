<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>显示器扫码盘点工具</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app">
    <h1>显示器扫码盘点工具</h1>
    <p class="hint">用于现场扫描显示器 SN 条形码，并导出 Excel。</p>

    <section class="card">
      <label>SN 序列号</label>
      <div class="row">
        <input id="sn" placeholder="扫码后自动填入，也可以手动输入" />
        <button id="scanBtn">扫 SN</button>
      </div>

      <div id="scannerBox" class="scanner hidden">
        <div id="reader"></div>
        <button id="stopScanBtn" class="secondary">停止扫码</button>
      </div>

      <label>型号</label>
      <input id="model" placeholder="例如 Dell P2422H" />

      <label>位置</label>
      <input id="location" placeholder="例如 财务办公室 / 会议室 / 库房" />

      <label>使用人</label>
      <input id="user" placeholder="例如 Allen Feng / 闲置" />

      <label>状态</label>
      <select id="status">
        <option>在用</option>
        <option>闲置</option>
        <option>损坏</option>
        <option>未知</option>
      </select>

      <label>备注</label>
      <textarea id="remark" placeholder="可填写异常情况、缺线、无底座等"></textarea>

      <button id="addBtn" class="primary">添加到列表</button>
    </section>

    <section class="card">
      <div class="listHeader">
        <h2>已录入列表</h2>
        <button id="exportBtn">导出 Excel</button>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th>SN序列号</th>
              <th>型号</th>
              <th>位置</th>
              <th>使用人</th>
              <th>状态</th>
              <th>备注</th>
              <th>录入时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="inventoryBody"></tbody>
        </table>
      </div>
    </section>
  </div>
</body>
</html>
